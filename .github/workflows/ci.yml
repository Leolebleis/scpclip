name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Unit tests with coverage
        shell: bash
        run: |
          mkdir -p coverage/unit
          go test -v -cover ./... -args -test.gocoverdir="$PWD/coverage/unit"

      - name: Setup clipboard and SSH (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "::group::Install packages"
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb xclip openssh-server
          echo "::endgroup::"
          echo "::group::Configure SSH"
          sudo systemctl enable ssh
          sudo systemctl start ssh
          chmod g-w "$HOME"
          chmod o-w "$HOME"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keygen -t ed25519 -f "$HOME/.ssh/id_ed25519" -N ""
          cat "$HOME/.ssh/id_ed25519.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          echo "NoHostAuthenticationForLocalhost yes" >> "$HOME/.ssh/config"
          sudo systemctl restart ssh
          echo "::endgroup::"
          echo "Testing SSH..."
          ssh localhost "echo SSH OK"

      - name: Setup clipboard and SSH (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Installing pngpaste..."
          brew install pngpaste
          echo "Enabling Remote Login..."
          sudo systemsetup -setremotelogin on
          echo "Configuring SSH keys..."
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keygen -t ed25519 -f "$HOME/.ssh/id_ed25519" -N ""
          cat "$HOME/.ssh/id_ed25519.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          echo "NoHostAuthenticationForLocalhost yes" >> "$HOME/.ssh/config"
          echo "Testing SSH..."
          ssh localhost "echo SSH OK"

      - name: Setup SSH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Starting sshd (pre-installed on Server 2025)..."
          Start-Service sshd
          Write-Host "Configuring SSH keys..."
          New-Item -ItemType Directory -Path "$env:USERPROFILE\.ssh" -Force | Out-Null
          ssh-keygen -t ed25519 -f "$env:USERPROFILE\.ssh\id_ed25519" -N '""'
          $pubkey = Get-Content "$env:USERPROFILE\.ssh\id_ed25519.pub"
          $pubkey | Set-Content "C:\ProgramData\ssh\administrators_authorized_keys"
          icacls.exe "C:\ProgramData\ssh\administrators_authorized_keys" /inheritance:r /grant "Administrators:F" /grant "SYSTEM:F"
          Write-Host "Testing SSH..."
          ssh -o StrictHostKeyChecking=no localhost "echo SSH OK"

      - name: Integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum go test -tags integration -v -count=1 ./...

      - name: Integration tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: go test -tags integration -v -count=1 ./...

      - name: Coverage report
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -d coverage/unit ]; then
            echo "## Coverage"
            go tool covdata percent -i=./coverage/unit
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build all targets
        run: |
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS="${pair%/*}" GOARCH="${pair#*/}" CGO_ENABLED=0 go build -o /dev/null .
            echo "OK: $pair"
          done
